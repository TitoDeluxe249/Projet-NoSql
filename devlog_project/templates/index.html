<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevLog - Journal de Développement</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-5">
    <h1 class="mb-4">📘 DevLog</h1>
    <form method="post" action="/add">
        <div class="mb-3">
            <label for="content" class="form-label">Contenu du journal</label>
            <textarea class="form-control" name="content" id="content" rows="3" required></textarea>
        </div>
        <div class="mb-3">
            <label for="technologies" class="form-label">Technologies (séparées par une virgule)</label>
            <input type="text" class="form-control" name="technologies" id="technologies">
        </div>
        <div class="mb-3">
            <label for="mood" class="form-label">Humeur</label>
            <select name="mood" class="form-control">
                <option>productive</option>
                <option>frustrated</option>
                <option>happy</option>
                <option>stuck</option>
                <option>tired</option>
                <option>energized</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Ajouter le log</button>
    </form>

    <hr class="my-5">
    <h2>Logs récents</h2>
    {% for log in logs %}
        <div class="card mb-3">
            <div class="card-body">
                <h5 class="card-title">{{ log.date[:10] }} - {{ log.mood }}</h5>
                <p class="card-text">{{ log.content }}</p>
                <p><strong>Technologies :</strong> {{ log.technologies | join(', ') }}</p>
            </div>
        </div>
    {% else %}
        <p>Aucun log pour le moment.</p>
    {% endfor %}
</div>
</body>
</html>
